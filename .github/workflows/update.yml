name: Update CRAN Downloads

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cran-downloads-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install dependencies
        run: Rscript -e 'install.packages(c("RSQLite", "jsonlite"), repos = "https://cloud.r-project.org")'

      - name: Download previous database
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download latest --pattern "downloads.db"

      - name: Run update script
        run: Rscript scripts/update.R downloads.db

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date -u +'%Y%m%d-%H%M%S')"
          gh release create "$TAG" downloads.db \
            --title "CRAN Downloads $TAG" \
            --notes-file release_notes.md \
            --latest

      - name: Update last run timestamp
        run: |
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > last-updated.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last-updated.txt
          git diff --cached --quiet || git commit -m "chore: update last run time"
          git push
